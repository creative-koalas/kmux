name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install zsh (for integration tests)
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install project (system)
        run: uv pip install --system -e .[dev]

      - name: Install test tooling explicitly
        run: pip install pytest pytest-asyncio pytest-cov

      - name: Run tests (unit + integration)
        env:
          KMUX_RUN_INTEGRATION: "1"
        run: pytest -q --disable-warnings --maxfail=1 --cov=kmux --cov-report=term-missing
